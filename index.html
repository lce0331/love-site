<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>사랑해</title>

<style>
body {
  text-align: center;
  margin-top: 120px;
  font-family: Arial, sans-serif;
  overflow: hidden;
  background: linear-gradient(135deg, #ffe6f0, #fff0f5, #ffe6fa);
}

a {
  font-size: 28px;
  color: #ff1493;
  cursor: pointer;
  text-decoration: none;
  font-weight: bold;
}

a:hover {
  color: red;
}

#text {
  margin-top: 50px;
  font-size: 70px;
  font-weight: bold;
  display: none;
  animation: glow 1.5s infinite alternate;
  background: linear-gradient(90deg, #ff0080, #ff4d4d, #ff66cc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

@keyframes glow {
  from { text-shadow: 0 0 10px pink, 0 0 20px hotpink; }
  to { text-shadow: 0 0 20px red, 0 0 40px deeppink; }
}

.heart {
  position: fixed;
  bottom: -20px;
  font-size: 25px;
  animation: floatUp 4s linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-120vh) scale(1.8); opacity: 0; }
}
</style>
</head>

<body>

<a onclick="showLove()">여기 눌러봐 💖</a>

<div id="text">사랑해❤️</div>

<script>
function showLove() {
  document.getElementById("text").style.display = "block";

  for (let i = 0; i < 40; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random() * 40) + "px";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }
}
</script>

</body>
</html>
